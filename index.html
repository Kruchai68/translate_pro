<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>SPU AI Translator PRO</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
background:linear-gradient(120deg,#4facfe,#00f2fe);
color:white;
}

h2{font-size:34px;}

select{
padding:10px;
font-size:18px;
border-radius:8px;
border:none;
margin:5px;
}

button{
padding:12px 20px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:5px;
}

#micBtn{background:#4CAF50;color:white;}

.micActive{
background:#f44336 !important;
animation:blink 1s infinite;
}

#speakBtn{background:#ff9800;color:white;}
#clearBtn{background:#555;color:white;}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

.box{
background:white;
color:black;
padding:20px;
margin:15px auto;
border-radius:15px;
font-size:30px;
line-height:1.6;
width:90%;
height:220px;

white-space:pre-wrap;
word-break:break-word;

overflow:hidden;
text-align:left;
}

</style>

</head>

<body>

<h2>🎤 SPU AI Translator PRO</h2>

<select id="from">
<option value="th-TH">ไทย</option>
<option value="en-US">English</option>
<option value="zh-CN">中文</option>
<option value="ja-JP">日本語</option>
</select>

➡

<select id="to">
<option value="zh-CN">中文</option>
<option value="th-TH">ไทย</option>
<option value="en-US">English</option>
<option value="ja-JP">日本語</option>
</select>

<br>

<button id="micBtn" onclick="toggleMic()">🎤 เปิดไมค์</button> <button id="speakBtn" onclick="manualSpeak()">🔊 อ่านออกเสียง</button> <button id="clearBtn" onclick="clearText()">🧹 ล้าง</button>

<h3>ข้อความต้นฉบับ</h3>
<div id="original" class="box"></div>

<h3>คำแปล</h3>
<div id="translated" class="box"></div>

<script>

let recognition
let micOn=false
let micAllowed=false
let bufferText=""
let translatedText=""

window.onload = async function(){

try{

await navigator.mediaDevices.getUserMedia({audio:true})

micAllowed=true

}catch(e){

alert("กรุณากด Allow Microphone")

}

}

function toggleMic(){

if(!micAllowed){
alert("ต้อง Allow ไมค์ก่อน")
return
}

if(!micOn){

startRecognition()

micOn=true
micBtn.innerText="⛔ ปิดไมค์"
micBtn.classList.add("micActive")

}else{

stopRecognition()

}

}

function startRecognition(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

recognition = new SpeechRecognition()

recognition.lang=document.getElementById("from").value
recognition.continuous=true
recognition.interimResults=false

recognition.onresult=function(event){

let text=event.results[0][0].transcript

bufferText+=" "+text

original.innerText=bufferText

translate(bufferText)

checkFull()

}

recognition.onend=function(){

if(micOn){
recognition.start()
}

}

recognition.start()

}

function stopRecognition(){

if(recognition){
recognition.stop()
}

micOn=false
micBtn.innerText="🎤 เปิดไมค์"
micBtn.classList.remove("micActive")

}

async function translate(text){

let from=document.getElementById("from").value.split("-")[0]
let to=document.getElementById("to").value.split("-")[0]

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)

let data=await res.json()

translatedText=data[0].map(x=>x[0]).join("")

translated.innerText=translatedText

}

function checkFull(){

if(original.scrollHeight > original.clientHeight){

autoSpeak()

}

}

function autoSpeak(){

stopRecognition()

let speech=new SpeechSynthesisUtterance(translatedText)

speech.lang=document.getElementById("to").value

speech.onend=function(){

clearText()

}

speechSynthesis.cancel()
speechSynthesis.speak(speech)

}

function manualSpeak(){

if(translatedText=="") return

autoSpeak()

}

function clearText(){

bufferText=""
translatedText=""

original.innerText=""
translated.innerText=""

}

</script>

</body>
</html>
